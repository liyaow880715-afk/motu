name: Deploy Auth Server

on:
  push:
    paths:
      - 'auth-server/**'
      - '.github/workflows/deploy-auth-server.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo chown -R $USER:$USER /opt/auth-server || true
            cd /opt/auth-server
            git pull origin main || (sudo rm -rf /opt/auth-server && cd /opt && git clone --depth 1 https://github.com/liyaow880715-afk/motu.git temp_clone && sudo mv temp_clone/auth-server . && rm -rf temp_clone)
            cd /opt/auth-server
            npm install
            npx prisma generate --schema=prisma/schema.prisma
            npx prisma migrate deploy --schema=prisma/schema.prisma
            sudo systemctl restart motu-auth
            echo "Deployment completed"
